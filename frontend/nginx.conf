# Single-server nginx config for the production frontend image.
# Listens on 8080 to match Cloud Run's container_port; serves the Vite
# build with an SPA fallback and a long immutable cache on hashed assets.

server {
    listen 8080 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Hashed assets from Vite are content-addressed — safe to cache forever.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback: any other path falls through to index.html so the React
    # router (or URL-state restoration) can handle it client-side.
    location / {
        try_files $uri /index.html;
    }
}
